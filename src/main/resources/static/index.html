<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle suas Despesas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">

</head>
<body>

<main class="main-wrapper">
    <header class="topbar">
        <div class="page-title">Sua agenda finânceira inteligente - Consulte nossa IA</div>
    </header>

    <section class="main-content">

        <div class="action-bar">
            <span id="recordStatus"></span>
            <button id="recordBtn">Gravar áudio</button>
        </div>

        <div class="panel chat-container">
            <div class="panel-title">Consultor Financeiro </div>
            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" placeholder="Faça uma pergunta sobre seu orçamento atual e eu analisarei seus dados...">
                <button id="sendChatBtn">Analisar</button>
            </div>
            <div id="chatResponse">
                Aguardando sua pergunta para analisar os dados financeiros...
            </div>
        </div>

        <div class="cards-grid">
            <div class="card card-auto">
                <div class="card-value" id="total-auto">Carregando...</div>
                <div class="card-title">Automóvel</div>
            </div>
            <div class="card card-groceries">
                <div class="card-value" id="total-groceries">Carregando...</div>
                <div class="card-title">Mercado</div>
            </div>
            <div class="card card-pharma">
                <div class="card-value" id="total-pharma">Carregando...</div>
                <div class="card-title">Farmácia</div>
            </div>
        </div>

        <div class="dashboard-content">
            <div class="panel">
                <div class="panel-title">Distribuição de Despesas</div>
                <canvas id="expensesChart"></canvas>
            </div>

            <div class="panel">
                <div class="panel-title">Últimas Transações</div>
                <table>
                    <thead>
                    <tr>
                        <th>Identificação</th>
                        <th>Categoria</th>
                        <th>Valor</th>
                    </tr>
                    </thead>
                    <tbody id="table-body">
                    </tbody>
                </table>
            </div>
        </div>

    </section>
</main>

<script src="app.js"></script>
</body>
</html>
